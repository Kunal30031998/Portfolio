<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a1024"/>
      <stop offset="55%" stop-color="#040814"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7afff0"/>
      <stop offset="55%" stop-color="#1a8a9e"/>
      <stop offset="100%" stop-color="#06202b"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#88a3ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="120" cy="80"  r="1.5"/>
    <circle cx="280" cy="150" r="1"/>
    <circle cx="450" cy="60"  r="2"/>
    <circle cx="700" cy="120" r="1"/>
    <circle cx="900" cy="80"  r="1.5"/>
    <circle cx="1080" cy="180" r="1"/>
    <circle cx="180" cy="500" r="1"/>
    <circle cx="380" cy="560" r="1.5"/>
    <circle cx="620" cy="540" r="1"/>
    <circle cx="980" cy="500" r="2"/>
    <circle cx="1120" cy="450" r="1"/>
    <circle cx="60"  cy="320" r="1"/>
  </g>

  <!-- decorative planet -->
  <circle cx="980" cy="315" r="170" fill="url(#planet)"/>
  <ellipse cx="980" cy="315" rx="240" ry="38" fill="none" stroke="#64ffda" stroke-opacity="0.35" stroke-width="2"/>

  <!-- name -->
  <text x="80" y="270" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif"
        font-size="86" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Kunal Gautam
  </text>

  <!-- title with accent gradient -->
  <text x="80" y="345" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif"
        font-size="40" font-weight="600" fill="url(#accent)">
    Full Stack Software Engineer
  </text>

  <!-- description -->
  <text x="80" y="410" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif"
        font-size="26" fill="#b8c5e0">
    6+ years shipping cloud-native, high-traffic web apps
  </text>

  <!-- tech stack chips -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" fill="#64ffda">
    <text x="80" y="500">React</text>
    <text x="180" y="500">·</text>
    <text x="200" y="500">TypeScript</text>
    <text x="350" y="500">·</text>
    <text x="370" y="500">Node.js</text>
    <text x="490" y="500">·</text>
    <text x="510" y="500">Java</text>
    <text x="585" y="500">·</text>
    <text x="605" y="500">AWS</text>
    <text x="670" y="500">·</text>
    <text x="690" y="500">GCP</text>
  </g>

  <!-- footer -->
  <text x="80" y="585" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="18" fill="#5a6987">
    portfolio.kunal-gautam-570.workers.dev
  </text>
</svg>
