    <!-- ═══════════════════════════════════════════════════
         GOOGLE ANALYTICS 4
         Replace G-XXXXXXXXXX with your real Measurement ID
         from https://analytics.google.com
    ════════════════════════════════════════════════════ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1QXJQ2H61E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1QXJQ2H61E', {
        page_title: document.title,
        page_location: window.location.href
      });

      // ── Section visibility tracking ──────────────────────────────────────
      // Fires a GA4 event when each portfolio section enters the viewport.
      // In GA4: Events → section_view; dimension: section_name.
      document.addEventListener('DOMContentLoaded', () => {
        const SECTIONS = ['hero','about','projects','skills','experience','terminal','contact'];
        const seen = new Set();
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting && !seen.has(e.target.id)) {
              seen.add(e.target.id);
              gtag('event', 'section_view', { section_name: e.target.id });
            }
          });
        }, { threshold: 0.3 });
        SECTIONS.forEach(id => {
          const el = document.getElementById(id);
          if (el) io.observe(el);
        });

        // ── Resume download click tracking ──────────────────────────────
        document.addEventListener('click', (e) => {
          const link = e.target.closest('a[href]');
          if (!link) return;
          const href = link.getAttribute('href') || '';
          if (href.includes('Resume') || href.includes('.pdf')) {
            gtag('event', 'resume_download', { file_name: href.split('/').pop() });
          }
          // Project / experience CTA clicks
          const cta = e.target.closest('[data-cta]');
          if (cta) {
            gtag('event', 'cta_click', { cta_label: cta.dataset.cta });
          }
          // Outbound links (GitHub, LinkedIn)
          if (link.hostname && link.hostname !== location.hostname) {
            gtag('event', 'outbound_click', { link_url: link.href, link_text: link.innerText?.trim().slice(0,60) });
          }
        });

        // ── Scroll depth tracking (25 / 50 / 75 / 100%) ────────────────
        const depthsFired = new Set();
        window.addEventListener('scroll', () => {
          const scrolled = window.scrollY;
          const total = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
          const pct = Math.round((scrolled / total) * 100);
          [25, 50, 75, 100].forEach(d => {
            if (pct >= d && !depthsFired.has(d)) {
              depthsFired.add(d);
              gtag('event', 'scroll_depth', { depth_percent: d });
            }
          });
        }, { passive: true });
      });
    </script>
